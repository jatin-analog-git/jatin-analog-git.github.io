<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" aria-label="OTA circuit schematic">
    <defs>
        <style>
            .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        </style>
        <filter id="gs">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="gl">
            <feGaussianBlur stdDeviation="6" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <path id="p-vp"  d="M 45,136 H 85"/>
        <path id="p-vm"  d="M 45,184 H 85"/>
        <path id="p-out" d="M 232,160 H 271"/>
    </defs>

    <!-- Background circuit grid -->
    <g stroke="#00d4ff" opacity="0.06" stroke-width="0.8">
        <line x1="0"   y1="80"  x2="320" y2="80"  stroke-dasharray="3,14"/>
        <line x1="0"   y1="160" x2="320" y2="160" stroke-dasharray="3,14"/>
        <line x1="0"   y1="240" x2="320" y2="240" stroke-dasharray="3,14"/>
        <line x1="80"  y1="0"   x2="80"  y2="320" stroke-dasharray="3,14"/>
        <line x1="160" y1="0"   x2="160" y2="320" stroke-dasharray="3,14"/>
        <line x1="240" y1="0"   x2="240" y2="320" stroke-dasharray="3,14"/>
    </g>

    <!-- V+ input trace -->
    <line x1="45" y1="136" x2="85" y2="136" stroke="#00d4ff" stroke-width="2.5" opacity="0.9" filter="url(#gs)"/>
    <circle cx="46" cy="136" r="4.5" fill="#00d4ff" opacity="0.95" filter="url(#gs)"/>
    <text x="50" y="122" class="mono" font-size="13" font-weight="bold" fill="#00ff88" filter="url(#gs)">V+</text>

    <!-- V− input trace -->
    <line x1="45" y1="184" x2="85" y2="184" stroke="#00d4ff" stroke-width="2.5" opacity="0.9" filter="url(#gs)"/>
    <circle cx="46" cy="184" r="4.5" fill="#00d4ff" opacity="0.95" filter="url(#gs)"/>
    <text x="50" y="207" class="mono" font-size="13" font-weight="bold" fill="#94a3b8">V−</text>

    <!-- Op-amp triangle — glow layer -->
    <polygon points="85,88 85,232 232,160"
        fill="rgba(0,212,255,0.03)" stroke="#00d4ff" stroke-width="6" opacity="0.1"
        filter="url(#gl)"/>
    <!-- Op-amp triangle — main outline -->
    <polygon points="85,88 85,232 232,160"
        fill="rgba(0,212,255,0.05)" stroke="#00d4ff" stroke-width="2.5"/>

    <!-- Polarity markers inside -->
    <text x="95" y="143" font-family="monospace" font-size="19" font-weight="bold" fill="#00ff88" filter="url(#gs)">+</text>
    <text x="95" y="197" font-family="monospace" font-size="19" font-weight="bold" fill="#64748b">−</text>

    <!-- OTA label centered inside triangle -->
    <text x="155" y="166" class="mono" font-size="14" font-weight="bold" fill="#00d4ff"
        letter-spacing="2" opacity="0.9" text-anchor="middle" filter="url(#gs)">OTA</text>

    <!-- Output trace -->
    <line x1="232" y1="160" x2="271" y2="160" stroke="#00ff88" stroke-width="3" opacity="0.95" filter="url(#gs)"/>
    <text x="234" y="149" class="mono" font-size="11" fill="#00ff88" filter="url(#gs)">Vout</text>

    <!-- Pulsing output terminal -->
    <circle cx="270" cy="160" r="6" fill="#00ff88" opacity="0.95" filter="url(#gl)">
        <animate attributeName="r"       values="5;8;5"       dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;1;0.75" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Output sine wave (draws in, holds, resets) -->
    <path d="M 232 180 C 237 170 242 170 247 180 C 252 190 257 190 262 180 C 267 170 272 170 272 180"
        stroke="#00ff88" stroke-width="2" fill="none" opacity="0.8" filter="url(#gs)"
        stroke-dasharray="70" stroke-dashoffset="70">
        <animate attributeName="stroke-dashoffset"
            values="70;0;0;70" keyTimes="0;0.4;0.75;1"
            dur="2.8s" repeatCount="indefinite"/>
    </path>

    <!-- Junction nodes at triangle inputs -->
    <circle cx="85" cy="136" r="3.5" fill="#00d4ff">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="184" r="3.5" fill="#00d4ff">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="232" cy="160" r="4" fill="#00ff88">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Signal dots — V+ (two staggered) -->
    <circle r="4" fill="#00d4ff" filter="url(#gl)">
        <animateMotion dur="1.4s" repeatCount="indefinite" begin="0s">
            <mpath href="#p-vp"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="1.4s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle r="4" fill="#00d4ff" filter="url(#gl)">
        <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.7s">
            <mpath href="#p-vp"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="1.4s" repeatCount="indefinite" begin="0.7s"/>
    </circle>

    <!-- Signal dots — V− -->
    <circle r="4" fill="#00d4ff" filter="url(#gl)">
        <animateMotion dur="1.4s" repeatCount="indefinite" begin="0.35s">
            <mpath href="#p-vm"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="1.4s" repeatCount="indefinite" begin="0.35s"/>
    </circle>

    <!-- Signal dots — Vout (larger, green, faster) -->
    <circle r="5" fill="#00ff88" filter="url(#gl)">
        <animateMotion dur="1.1s" repeatCount="indefinite" begin="0.5s">
            <mpath href="#p-out"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="1.1s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle r="5" fill="#00ff88" filter="url(#gl)">
        <animateMotion dur="1.1s" repeatCount="indefinite" begin="1.05s">
            <mpath href="#p-out"/>
        </animateMotion>
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="1.1s" repeatCount="indefinite" begin="1.05s"/>
    </circle>

    <!-- Corner accent dots -->
    <circle cx="82"  cy="82"  r="2.5" fill="#00d4ff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="238" cy="82"  r="2.5" fill="#00d4ff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="82"  cy="238" r="2.5" fill="#00d4ff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" begin="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="238" cy="238" r="2.5" fill="#00d4ff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" begin="0.6s" repeatCount="indefinite"/></circle>
</svg>
