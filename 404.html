<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Open Circuit | Jatin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Serif+4:wght@400;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f2ede2;
            background-image: repeating-linear-gradient(transparent, transparent 31px, #ded6c0 31px, #ded6c0 32px);
            font-family: 'JetBrains Mono', monospace;
            color: #0f1620;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(168, 50, 30, 0.2);
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-family: 'Source Serif 4', serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 700;
            color: #0f1620;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .error-title {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #d4a574;
            margin-bottom: 1.5rem;
        }
        .error-message {
            font-size: 14px;
            color: #6a7485;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 12px 24px;
            border: 2px solid #0f1620;
            box-shadow: 2px 2px 0 #0f1620;
            color: #0f1620;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            transition: 0.15s ease;
        }
        .home-link:hover {
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 #0f1620;
        }
        .schematic-note {
            margin-top: 3rem;
            font-family: 'Source Serif 4', serif;
            font-style: italic;
            font-size: 12px;
            color: #d4a574;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-title">Open Circuit</div>
        <p class="error-message">No signal detected on this path.<br>The node you're looking for is floating.</p>
        <a href="index.html" class="home-link">Return to Schematic →</a>
        <p class="schematic-note">✏ [Logbook Ref: Check netlist connectivity — missing via or broken trace]</p>
    </div>
</body>
</html>
